<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LARA - PMO SaaS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #17B8A0 0%, #0B7B8C 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .layout {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      width: 100%;
      max-width: 1020px;
    }
    @media (max-width: 860px) {
      .layout { flex-direction: column; }
    }
    .box {
      background: white;
      padding: 50px;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .dashboard-panel {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: none;
    }
    .dashboard-panel .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .dashboard-panel .greeting {
      color: #0B7B8C;
      font-size: 0.9em;
    }
    .dashboard-panel .logout-btn {
      width: auto;
      padding: 8px 16px;
      font-size: 0.85em;
    }
    .dashboard-panel h2 {
      font-size: 1.5em;
      color: #0B7B8C;
      margin-bottom: 24px;
      line-height: 1.3;
    }
    .stat-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #F5FBFA;
      border: 1px solid #E0F2F1;
      border-radius: 10px;
      padding: 14px;
    }
    .stat-card .stat-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #333;
      font-size: 0.85em;
      margin-bottom: 8px;
    }
    .stat-card .stat-line {
      font-size: 0.8em;
      color: #555;
      margin-bottom: 4px;
    }
    .stat-card.empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #666;
      font-size: 0.9em;
    }
    .header { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      margin-bottom: 30px; 
      padding-bottom: 20px; 
      border-bottom: 2px solid #E0F2F1;
    }
    .logo { 
      width: 100px; 
      height: 100px; 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo img { 
      width: 100%; 
      height: 100%;
      object-fit: contain;
    }
    .brand h1 { 
      font-size: 1.8em; 
      color: #0B7B8C; 
      margin: 0;
    }
    .brand p { 
      font-size: 0.9em; 
      color: #17B8A0; 
      margin: 5px 0 0 0;
    }
    .form-group { 
      margin-bottom: 20px; 
    }
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: #333; 
      font-weight: 600;
    }
    input[type="text"], input[type="file"], select {
      width: 100%; 
      padding: 12px; 
      border: 2px solid #E0F2F1; 
      border-radius: 8px; 
      font-size: 1em;
      font-family: inherit;
    }
    input[type="text"]:focus, input[type="file"]:focus, select:focus {
      outline: none; 
      border-color: #17B8A0; 
      box-shadow: 0 0 0 3px rgba(23, 184, 160, 0.1);
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: linear-gradient(135deg, #17B8A0 0%, #0B7B8C 100%); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 1em; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s;
    }
    button:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 10px 20px rgba(23, 184, 160, 0.3);
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed;
    }
    .loading { 
      display: none; 
      text-align: center; 
      margin-top: 20px;
    }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); }
    }
    .alert { 
      padding: 15px; 
      border-radius: 8px; 
      margin-top: 20px; 
      font-weight: 500;
    }
    .alert-error { 
      background-color: #FFEBEE; 
      color: #C62828; 
      border-left: 4px solid #C62828;
    }
    .alert-success { 
      background-color: #E8F5E9; 
      color: #2E7D32; 
      border-left: 4px solid #2E7D32;
    }
    #userInfo { 
      display: none; 
      text-align: right; 
      color: #0B7B8C; 
      font-size: 0.9em; 
      margin-bottom: 20px;
    }
    #userInfo button { 
      width: auto; 
      padding: 8px 16px; 
      font-size: 0.85em; 
      margin-top: 10px;
    }
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      background: white;
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      max-width: 400px;
      pointer-events: auto;
      animation: slideInRight 0.3s ease-out;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    @keyframes slideInRight {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(400px); opacity: 0; }
    }
    .toast.hide { animation: slideOutRight 0.3s ease-out forwards; }
    .toast-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .toast-content { flex: 1; }
    .toast-title { font-weight: 600; color: #333; font-size: 14px; margin-bottom: 4px; }
    .toast-message { color: #666; font-size: 13px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="layout">
    <div class="dashboard-panel" id="dashboardPanel">
      <div class="top-row">
        <p class="greeting">👋 Bienvenido, <strong id="userName"></strong></p>
        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
      </div>
      <h2 id="welcomeHeading">¡Bienvenido de nuevo!</h2>
      <div class="stat-cards" id="statCards"></div>
      <button onclick="window.location='/portfolio'" style="background:white; color:#0B7B8C; border:2px solid #17B8A0;">📁 Ver proyectos existentes</button>
    </div>
    <div class="box">
      <div class="header">
        <div class="logo"><img src="logo.jpeg" alt="LARA Logo"></div>
        <div class="brand">
          <h1>LARA</h1>
          <p>Intelligence Accelerated</p>
        </div>
      </div>
      <h2 style="font-size: 1.3em; color: #333; margin-bottom: 20px;">Start Analysis</h2>
      <form id="form">
        <div class="form-group">
          <label for="org">Nombre Organización</label>
          <input type="text" id="org" placeholder="Acme Corp" required>
        </div>
        <div class="form-group">
          <label for="file">Archivo Excel con Proyectos</label>
          <input type="file" id="file" accept=".xlsx" required>
        </div>
        <div class="form-group">
          <label for="fw">Metodología</label>
          <select id="fw" required>
            <option value="scrum">Scrum</option>
            <option value="kanban">Kanban</option>
            <option value="waterfall">Waterfall</option>
            <option value="safe">SAFe</option>
          </select>
        </div>
        <button type="submit" id="btn">🚀 EJECUTAR ANÁLISIS</button>
        <div class="loading" id="loading">
          <div style="border: 4px solid #f3f3f3; border-top: 4px solid #17B8A0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
          <p style="color: #17B8A0; font-weight: 600; margin-top: 10px;">Procesando...</p>
        </div>
        <div id="alert"></div>
      </form>
    </div>
  </div>

  <!-- MODAL MAPEO -->
  <div id="mappingModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
      <div style="background: linear-gradient(to right, #17B8A0, #0B7B8C); color: white; padding: 24px;">
        <h2 style="font-size: 1.5em; font-weight: bold; margin: 0;">Mapeo de Columnas</h2>
        <p style="font-size: 0.9em; margin: 8px 0 0 0; opacity: 0.9;">Confirma el mapeo de tus columnas</p>
      </div>
      <div style="padding: 24px;">
        <div id="mappingForm"></div>
        <div id="validationMessage" style="display: none; padding: 12px; border-radius: 8px; font-size: 0.9em; margin-top: 16px;"></div>
      </div>
      <div style="background: #f5f5f5; padding: 16px 24px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; gap: 12px;">
        <button onclick="closeMappingModal()" style="background: #ccc; color: #333; padding: 10px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Cancelar</button>
        <button onclick="confirmMapping()" id="confirmMappingBtn" style="background: linear-gradient(135deg, #17B8A0 0%, #0B7B8C 100%); color: white; padding: 10px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- SPINNER -->
  <div id="detectingSpinner" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 12px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;">
      <div style="border: 4px solid #f3f3f3; border-top: 4px solid #17B8A0; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
      <p style="margin-top: 16px; color: #333; font-weight: 600;">Analizando columnas...</p>
    </div>
  </div>

  <script>
    let currentDetectionState = {
      headers: [],
      sampleRows: [],
      suggestions: [],
      tempFilename: '',
    };

    window.onload = async () => {
      const res = await fetch('/api/auth/me');
      if (!res.ok) { window.location = '/login'; return; }
      const data = await res.json();
      document.getElementById('userName').textContent = data.user.email;
      document.getElementById('welcomeHeading').textContent = `¡Bienvenido de nuevo, ${data.user.email}!`;
      document.getElementById('dashboardPanel').style.display = 'block';
      loadDashboardStats();
    };

    async function loadDashboardStats() {
      const statCards = document.getElementById('statCards');
      try {
        const res = await fetch('/api/portfolio');
        if (!res.ok) throw new Error('No se pudo cargar el portafolio');
        const { summary, projects } = await res.json();

        if (!summary.totalProjects) {
          statCards.innerHTML = `
            <div class="stat-card empty">Aún no tienes proyectos. Sube tu primer Excel para empezar 🚀</div>
          `;
          return;
        }

        const atRiskProjects = projects.filter(p => p.healthLabel !== 'HEALTHY');
        const totalAlerts = projects.reduce((sum, p) => sum + (p.totalAlerts || 0), 0);
        const projectsWithAlerts = projects.filter(p => p.totalAlerts > 0);

        statCards.innerHTML = `
          ${renderStatCard('📁', `Tus Proyectos (${summary.totalProjects})`, projects.slice(0, 2).map(p => p.name))}
          ${renderStatCard('⚠️', `Proyectos en Riesgo (${atRiskProjects.length})`, atRiskProjects.slice(0, 2).map(p => p.name))}
          ${renderStatCard('🔔', `Avisos/Warnings (${totalAlerts})`, projectsWithAlerts.slice(0, 2).map(p => p.alertSummary).filter(Boolean))}
        `;
      } catch (error) {
        statCards.innerHTML = `<div class="stat-card empty">No se pudieron cargar tus estadísticas.</div>`;
      }
    }

    function renderStatCard(icon, title, lines) {
      const body = lines.length
        ? lines.map(l => `<div class="stat-line">${escapeHtml(l)}</div>`).join('')
        : `<div class="stat-line">Sin datos</div>`;
      return `
        <div class="stat-card">
          <div class="stat-title">${icon} ${escapeHtml(title)}</div>
          ${body}
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' }).then(() => {
        window.location = '/login';
      });
    }

    function showAlert(message, isError = false) {
      const alertDiv = document.getElementById('alert');
      alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
      alertDiv.textContent = message;
      alertDiv.style.display = 'block';
    }

    function showToast(title, message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="toast-icon">⚠️</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 300);
      }, 5000);
    }

    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const file = document.getElementById('file').files[0];
      if (!file) { showAlert('Selecciona archivo', true); return; }
      
      document.getElementById('btn').disabled = true;
      document.getElementById('loading').style.display = 'block';
      
      await uploadAndDetectColumns(file);
      
      document.getElementById('btn').disabled = false;
      document.getElementById('loading').style.display = 'none';
    };

    async function uploadAndDetectColumns(file) {
      const formData = new FormData();
      formData.append('file', file);
      const spinner = document.getElementById('detectingSpinner');
      spinner.style.display = 'flex';

      try {
        const response = await fetch('/api/data/mapping/detect-columns', {
          method: 'POST',
          credentials: 'include',
          body: formData,
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error);
        }

        const result = await response.json();
        currentDetectionState = {
          headers: result.data.headers,
          sampleRows: result.data.sampleRows,
          suggestions: result.data.suggestions,
          tempFilename: result.data.tempFilename,
        };

        showMappingModal();
      } catch (error) {
        showAlert('Error: ' + error.message, true);
      } finally {
        spinner.style.display = 'none';
      }
    }

    function showMappingModal() {
      const formDiv = document.getElementById('mappingForm');
      formDiv.innerHTML = '';

      const fieldOptions = [
        { value: '', label: '(No mapear)' },
        { value: 'project_name', label: 'Nombre de Proyecto *' },
        { value: 'status', label: 'Estado' },
        { value: 'estimated_cost', label: 'Costo Estimado' },
        { value: 'actual_cost', label: 'Costo Real' },
        { value: 'progress_percent', label: 'Progreso (%)' },
        { value: 'start_date', label: 'Fecha Inicio' },
        { value: 'end_date', label: 'Fecha Fin' },
        { value: 'risks', label: 'Riesgos' },
        { value: 'assignee', label: 'Responsable / Asignado a' },
      ];

      currentDetectionState.headers.forEach((header) => {
        const suggestion = currentDetectionState.suggestions.find(s => s.originalHeader === header);
        
        const div = document.createElement('div');
        div.style.cssText = 'display: flex; align-items: center; gap: 12px; padding: 12px; background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px;';

        const label = document.createElement('label');
        label.style.cssText = 'width: 30%; font-weight: 600; font-size: 0.9em;';
        label.textContent = `"${header}"`;

        const select = document.createElement('select');
        select.style.cssText = 'flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em;';
        select.dataset.header = header;

        fieldOptions.forEach((opt) => {
          const option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.label;
          if (suggestion?.suggestedField === opt.value) option.selected = true;
          select.appendChild(option);
        });

        div.appendChild(label);
        div.appendChild(select);
        formDiv.appendChild(div);
      });

      document.getElementById('mappingModal').style.display = 'flex';
    }

   async function confirmMapping() {
  const mapping = {};
  document.querySelectorAll('#mappingForm select').forEach(s => {
    mapping[s.dataset.header] = s.value || null;
  });

  if (!Object.values(mapping).includes('project_name')) {
    showValidationMessage('error', 'Mapea "Nombre de Proyecto"');
    return;
  }

  const btn = document.getElementById('confirmMappingBtn');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const loadingModal = document.createElement('div');
  loadingModal.id = 'execution-loading-modal';
  loadingModal.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  `;
  loadingModal.innerHTML = `
    <div style="background: white; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px;">
      <div style="border: 4px solid #f3f3f3; border-top: 4px solid #17B8A0; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
      <p style="margin-top: 20px; color: #333; font-weight: 600; font-size: 1.1em;">Ejecutando agentes de IA...</p>
      <p style="margin-top: 10px; color: #666; font-size: 0.9em;">Analizando riesgos, presupuesto y reportes</p>
      <p style="margin-top: 15px; color: #999; font-size: 0.85em;">Esto puede tomar 1-2 minutos</p>
    </div>
  `;

  try {
    
    closeMappingModal();
    document.body.appendChild(loadingModal);

    const framework = document.getElementById('fw').value;
    const response = await fetch('/api/data/mapping/save-mapping', {
      method: 'POST',
          credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        tempFilename: currentDetectionState.tempFilename,
        confirmedMapping: mapping,
        framework: framework,
        org: document.getElementById('org').value.trim() || 'Sin especificar',
        // Idioma del contenido IA (es/en) según el navegador/SO. Default es.
        lang: (navigator.language || 'es').toLowerCase().startsWith('en') ? 'en' : 'es',
      }),
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || 'Error desconocido');
    }

    // REDIRIGIR INMEDIATAMENTE cuando la respuesta llega (agentes ya terminaron)
    window.location = `/projects?id=${data.projectId}`;

  } catch (error) {
    const modal = document.getElementById('execution-loading-modal');
    if (modal) modal.remove();
    
    showAlert('Error: ' + error.message, true);
    btn.disabled = false;
    btn.textContent = 'Confirmar';
  }


}

    function closeMappingModal() {
      document.getElementById('mappingModal').style.display = 'none';
      document.getElementById('mappingForm').innerHTML = '';
    }

    function showValidationMessage(type, message) {
      const msgDiv = document.getElementById('validationMessage');
      msgDiv.style.display = 'block';
      msgDiv.style.background = type === 'error' ? '#FFEBEE' : '#E8F5E9';
      msgDiv.style.color = type === 'error' ? '#C62828' : '#2E7D32';
      msgDiv.textContent = message;
    }
  </script>

</body>
</html>
