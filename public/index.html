<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LARA - PMO SaaS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #00BCD4 0%, #26C6DA 100%);
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
    }
    .box { 
      background: white; 
      padding: 50px; 
      border-radius: 16px; 
      width: 100%; 
      max-width: 500px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
    }
    .header { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      margin-bottom: 30px; 
      padding-bottom: 20px; 
      border-bottom: 2px solid #E0F2F1;
    }
    .logo { 
      width: 100px; 
      height: 100px; 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo img { 
      width: 100%; 
      height: 100%;
      object-fit: contain;
    }
    .brand h1 { 
      font-size: 1.8em; 
      color: #00897B; 
      margin: 0;
    }
    .brand p { 
      font-size: 0.75em; 
      color: #00BCD4; 
      margin: 3px 0 0 0;
    }
    h2 { 
      background: linear-gradient(135deg, #00BCD4 0%, #00897B 100%);
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      font-size: 2em; 
      margin-bottom: 10px; 
    }
    .subtitle { color: #666; margin-bottom: 40px; font-size: 1.1em; }
    .group { margin-bottom: 25px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
    input, select { width: 100%; padding: 12px 15px; border: 2px solid #B2DFDB; border-radius: 8px; font-size: 1em; }
    input:focus, select:focus { outline: none; border-color: #00BCD4; box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1); }
    button { 
      width: 100%; 
      padding: 15px; 
      background: linear-gradient(135deg, #00BCD4 0%, #009688 100%);
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-weight: 700; 
      cursor: pointer; 
      margin-top: 20px; 
      font-size: 1.1em;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0, 188, 212, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .user-info { text-align: right; margin-bottom: 20px; padding: 10px; background: #F0F4F3; border-radius: 8px; }
    .logout-btn { background: #999; padding: 8px 16px; font-size: 0.9em; margin-top: 10px; width: auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .alert { padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: 600; }
    .alert-error { background: #FFEBEE; color: #C62828; border-left: 4px solid #C62828; }
    .alert-success { background: #E8F5E9; color: #2E7D32; border-left: 4px solid #2E7D32; }
  </style>
</head>
<body>
  <div class="box">
    <div class="header">
      <div class="logo"><img src="logo.jpeg" alt="LARA Logo"></div>
      <div class="brand">
        <h1>LARA</h1>
        <p>Intelligence Accelerated</p>
      </div>
    </div>

    <div class="user-info" id="userInfo" style="display: none;">
      <p>Bienvenido <strong id="userName"></strong></p>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>

    <h2>📊 PMO SaaS</h2>
    <p class="subtitle">Análisis Multi-Agente IA para tus Proyectos</p>
    
    <form id="form">
      <div class="group">
        <label for="org">Nombre de la Organización</label>
        <input type="text" id="org" placeholder="Ej: Acme Corp" required>
      </div>
      <div class="group">
        <label for="fw">Framework de Gestión</label>
        <select id="fw" required>
          <option value="">Selecciona framework...</option>
          <option value="scrum">🏃 Scrum</option>
          <option value="kanban">📊 Kanban</option>
          <option value="waterfall">📈 Waterfall</option>
          <option value="safe">🎯 SAFe</option>
        </select>
      </div>
      <div class="group">
        <label for="file">Cargar Archivo Excel (.xlsx)</label>
        <input type="file" id="file" accept=".xlsx" required>
      </div>
      <button type="submit" id="btn">🚀 EJECUTAR ANÁLISIS</button>
      <div class="loading" id="loading" style="display: none; text-align: center; margin-top: 20px;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #00BCD4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
        <p id="status" style="color: #00BCD4; font-weight: 600; margin-top: 10px;">Procesando...</p>
      </div>
      <div id="alert" style="display: none;"></div>
    </form>
  </div>

  <script>
    window.onload = async () => {
      const res = await fetch('/api/auth/me');
      if (!res.ok) { window.location = '/login'; return; }
      const data = await res.json();
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('userName').textContent = data.user.email;
    };

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' }).then(() => {
        window.location = '/login';
      });
    }

    function showAlert(message, isError = false) {
      const alertDiv = document.getElementById('alert');
      alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
      alertDiv.textContent = message;
      alertDiv.style.display = 'block';
    }

    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');
      const alertDiv = document.getElementById('alert');
      const orgName = document.getElementById('org').value;
      const fw = document.getElementById('fw').value;
      
      btn.disabled = true;
      loading.style.display = 'block';
      alertDiv.style.display = 'none';
      
      try {
        status.textContent = '📥 Cargando archivo...';
        const fd = new FormData();
        fd.append('file', document.getElementById('file').files[0]);
        const uploadRes = await fetch('/api/data/upload-excel', {method: 'POST', body: fd});
        const uploadData = await uploadRes.json();
        
        // ✅ VALIDAR: ¿Se guardaron proyectos?
        if (!uploadData.success || uploadData.count === 0) {
          showAlert(
            `❌ El archivo no contiene proyectos válidos. Se rechazaron ${uploadData.rejected || 'todas las'} filas. Verifica que el Excel tenga la estructura correcta.`,
            true
          );
          btn.disabled = false;
          loading.style.display = 'none';
          return;
        }

        status.textContent = '📋 Obteniendo proyecto...';
        const list = await fetch('/api/data/projects?limit=1');
        const json = await list.json();
        
        // ✅ VALIDAR: ¿Hay datos en la BD?
        if (!json.success || !json.data || json.data.length === 0) {
          showAlert(
            '❌ No se encontraron proyectos en la base de datos. Por favor intenta de nuevo.',
            true
          );
          btn.disabled = false;
          loading.style.display = 'none';
          return;
        }

        const pid = json.data[0].projectId;
        
        status.textContent = `🤖 Analizando proyecto ${pid}...`;
        await fetch(`/api/analysis/${pid}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({framework: fw, orgName})
        });
        
        status.textContent = '✅ Redirigiendo...';
        setTimeout(() => {
          window.location = `/projects?framework=${fw}&projectId=${pid}`;
        }, 500);
      } catch(e) {
        showAlert(`❌ ERROR: ${e.message}`, true);
        btn.disabled = false;
        loading.style.display = 'none';
      }
    };
  </script>
</body>
</html>
