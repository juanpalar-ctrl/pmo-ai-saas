<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LARA - PMO SaaS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #00BCD4 0%, #26C6DA 100%);
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
    }
    .box { 
      background: white; 
      padding: 50px; 
      border-radius: 16px; 
      width: 100%; 
      max-width: 500px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
    }
    .header { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      margin-bottom: 30px; 
      padding-bottom: 20px; 
      border-bottom: 2px solid #E0F2F1;
    }
    .logo { 
      width: 100px; 
      height: 100px; 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo img { 
      width: 100%; 
      height: 100%;
      object-fit: contain;
    }
    .brand h1 { 
      font-size: 1.8em; 
      color: #00897B; 
      margin: 0;
    }
    .brand p { 
      font-size: 0.9em; 
      color: #00BCD4; 
      margin: 5px 0 0 0;
    }
    .form-group { 
      margin-bottom: 20px; 
    }
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: #333; 
      font-weight: 600;
    }
    input[type="file"], select { 
      width: 100%; 
      padding: 12px; 
      border: 2px solid #E0F2F1; 
      border-radius: 8px; 
      font-size: 1em;
      font-family: inherit;
    }
    input[type="file"]:focus, select:focus { 
      outline: none; 
      border-color: #00BCD4; 
      box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1);
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: linear-gradient(135deg, #00BCD4 0%, #26C6DA 100%); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 1em; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s;
    }
    button:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 10px 20px rgba(0, 188, 212, 0.3);
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed;
    }
    .loading { 
      display: none; 
      text-align: center; 
      margin-top: 20px;
    }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); }
    }
    .alert { 
      padding: 15px; 
      border-radius: 8px; 
      margin-top: 20px; 
      font-weight: 500;
    }
    .alert-error { 
      background-color: #FFEBEE; 
      color: #C62828; 
      border-left: 4px solid #C62828;
    }
    .alert-success { 
      background-color: #E8F5E9; 
      color: #2E7D32; 
      border-left: 4px solid #2E7D32;
    }
    #userInfo { 
      display: none; 
      text-align: right; 
      color: #00897B; 
      font-size: 0.9em; 
      margin-bottom: 20px;
    }
    #userInfo button { 
      width: auto; 
      padding: 8px 16px; 
      font-size: 0.85em; 
      margin-top: 10px;
    }
    
    /* TOAST STYLES - Tailwind puro */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      pointer-events: none;
    }
    
    .toast {
      background: white;
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      max-width: 400px;
      pointer-events: auto;
      animation: slideInRight 0.3s ease-out;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    
    @keyframes slideInRight {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOutRight {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(400px);
        opacity: 0;
      }
    }
    
    .toast.hide {
      animation: slideOutRight 0.3s ease-out forwards;
    }
    
    .toast-icon {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    
    .toast-content {
      flex: 1;
    }
    
    .toast-title {
      font-weight: 600;
      color: #333;
      font-size: 14px;
      margin-bottom: 4px;
    }
    
    .toast-message {
      color: #666;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <div class="box">
    <div id="userInfo">
      <p>👋 Bienvenido, <strong id="userName"></strong></p>
      <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="header">
      <div class="logo">
        <img src="logo.jpeg" alt="LARA Logo">
      </div>
      <div class="brand">
        <h1>LARA</h1>
        <p>Intelligence Accelerated</p>
      </div>
    </div>

    <form id="form">
      <div class="form-group">
        <label for="org">Nombre Organización</label>
        <input type="text" id="org" placeholder="Acme Corp" required>
      </div>

      <div class="form-group">
        <label for="file">Archivo Excel con Proyectos</label>
        <input type="file" id="file" accept=".xlsx" required>
      </div>

      <div class="form-group">
        <label for="fw">Metodología</label>
        <select id="fw" required>
          <option value="scrum">Scrum</option>
          <option value="kanban">Kanban</option>
          <option value="waterfall">Waterfall</option>
          <option value="safe">SAFe</option>
        </select>
      </div>

      <button type="submit" id="btn">🚀 EJECUTAR ANÁLISIS</button>
      <div class="loading" id="loading" style="display: none; text-align: center; margin-top: 20px;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #00BCD4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto;"></div>
        <p id="status" style="color: #00BCD4; font-weight: 600; margin-top: 10px;">Procesando...</p>
      </div>
      <div id="alert" style="display: none;"></div>
    </form>
  </div>

  <script>
    /**
     * TOAST NOTIFICATION SYSTEM
     * Shows floating notifications in top-right corner
     * Auto-dismisses after 5 seconds
     */
    function showToast(title, message) {
      const container = document.getElementById('toast-container');
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="toast-icon">⚠️</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
      `;
      
      container.appendChild(toast);
      
      // Auto-hide after 5000ms
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => {
          toast.remove();
        }, 300); // Wait for animation
      }, 5000);
    }

    window.onload = async () => {
      const res = await fetch('/api/auth/me');
      if (!res.ok) { window.location = '/login'; return; }
      const data = await res.json();
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('userName').textContent = data.user.email;
    };

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' }).then(() => {
        window.location = '/login';
      });
    }

    function showAlert(message, isError = false) {
      const alertDiv = document.getElementById('alert');
      alertDiv.className = isError ? 'alert alert-error' : 'alert alert-success';
      alertDiv.textContent = message;
      alertDiv.style.display = 'block';
    }

    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');
      const alertDiv = document.getElementById('alert');
      const orgName = document.getElementById('org').value;
      const fw = document.getElementById('fw').value;
      
      btn.disabled = true;
      loading.style.display = 'block';
      alertDiv.style.display = 'none';
      
      try {
        status.textContent = '📥 Cargando archivo...';
        const fd = new FormData();
        fd.append('file', document.getElementById('file').files[0]);
        const uploadRes = await fetch('/api/data/upload-excel', {method: 'POST', body: fd});
        const uploadData = await uploadRes.json();
        
        // ✅ VALIDAR: ¿Se guardaron proyectos?
        if (!uploadData.success || uploadData.count === 0) {
          showAlert(
            `❌ El archivo no contiene proyectos válidos. Se rechazaron ${uploadData.rejected || 'todas las'} filas. Verifica que el Excel tenga la estructura correcta.`,
            true
          );
          btn.disabled = false;
          loading.style.display = 'none';
          return;
        }

        // NUEVO: Mostrar Toast si hay filas rechazadas
        if (uploadData.rejected > 0) {
          const message = `Se cargaron ${uploadData.count} fila(s), pero ${uploadData.rejected} fila(s) fue(ron) omitida(s) debido a formato inválido.`;
          showToast('⚠️ Filas Rechazadas', message);
        }

        status.textContent = '📋 Obteniendo proyecto...';
        const list = await fetch('/api/data/projects?limit=1');
        const json = await list.json();
        
        // ✅ VALIDAR: ¿Hay datos en la BD?
        if (!json.success || !json.data || json.data.length === 0) {
          showAlert(
            '❌ No se encontraron proyectos en la base de datos. Por favor intenta de nuevo.',
            true
          );
          btn.disabled = false;
          loading.style.display = 'none';
          return;
        }

        const pid = json.data[0].projectId;
        
        status.textContent = `🤖 Analizando proyecto ${pid}...`;
        
        // PASO 12: Guardar valores para reintentos
        currentAnalysisProjectId = pid;
        currentAnalysisFramework = fw;
        currentAnalysisOrgName = orgName;
        
        try {
          // PASO 12: Promise.race con timeout de 30 segundos
          await Promise.race([
            fetch(`/api/analysis/${pid}`, {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({framework: fw, orgName})
            }),
            new Promise((_, reject) =>
              setTimeout(() => reject(new Error('Timeout')), 30000)
            )
          ]);
          
          status.textContent = '✅ Redirigiendo...';
          setTimeout(() => {
            window.location = `/projects?framework=${fw}&projectId=${pid}`;
          }, 500);
        } catch (timeoutError) {
          if (timeoutError.message === 'Timeout') {
            console.warn('⚠️ Análisis tomó más de 30 segundos');
            showTimeoutModal();
          } else {
            throw timeoutError;
          }
        }
      } catch(e) {
        showAlert(`❌ ERROR: ${e.message}`, true);
        btn.disabled = false;
        loading.style.display = 'none';
      }
    };

    /**
     * PASO 12: VARIABLES GLOBALES PARA REINTENTOS
     */
    let currentAnalysisProjectId = null;
    let currentAnalysisFramework = null;
    let currentAnalysisOrgName = null;

    /**
     * PASO 12: MOSTRAR MODAL DE TIMEOUT
     */
    function showTimeoutModal() {
      document.getElementById('timeout-modal').style.display = 'flex';
    }

    /**
     * PASO 12: CERRAR MODAL DE TIMEOUT
     */
    function closeTimeoutModal() {
      document.getElementById('timeout-modal').style.display = 'none';
    }

    /**
     * PASO 12: REINTENTAR ANÁLISIS
     * Dispara nuevamente /api/analysis con el mismo projectId y framework
     */
    async function retryAnalysis() {
      if (!currentAnalysisProjectId) {
        console.error('No hay projectId almacenado para reintentar');
        return;
      }

      const retryBtn = document.getElementById('timeout-retry-btn');
      retryBtn.disabled = true;
      retryBtn.textContent = '⏳ Reintenando...';

      try {
        // Intentar análisis con timeout de 30 segundos
        await Promise.race([
          fetch(`/api/analysis/${currentAnalysisProjectId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              framework: currentAnalysisFramework,
              orgName: currentAnalysisOrgName
            })
          }),
          new Promise((_, reject) =>
            setTimeout(() => reject(new Error('Timeout')), 30000)
          )
        ]);

        // Si llegamos aquí, el análisis fue exitoso
        closeTimeoutModal();
        console.log('✅ Análisis exitoso, redirigiendo...');
        setTimeout(() => {
          window.location = `/projects?framework=${currentAnalysisFramework}&projectId=${currentAnalysisProjectId}`;
        }, 500);
      } catch (error) {
        console.error('Error en reintento:', error);
        retryBtn.disabled = false;
        retryBtn.textContent = '🔄 Reintentar';
        alert('❌ El reintento también falló. Por favor intenta más tarde.');
      }
    }
  </script>

  <!-- MODAL DE TIMEOUT (Agentes Saturados) -->
  <div id="timeout-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 99999; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 16px; padding: 40px; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;">
      <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
      <h2 style="font-size: 1.5em; font-weight: bold; color: #333; margin-bottom: 12px;">Agentes Saturados</h2>
      <p style="color: #666; font-size: 1em; line-height: 1.6; margin-bottom: 24px;">
        El análisis está tomando más tiempo de lo esperado. Los agentes IA están procesando muchas solicitudes. Por favor, intenta nuevamente.
      </p>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button id="timeout-retry-btn" onclick="retryAnalysis()" style="background: linear-gradient(135deg, #00BCD4 0%, #26C6DA 100%); color: white; padding: 12px 32px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1em;">
          🔄 Reintentar
        </button>
        <button onclick="closeTimeoutModal()" style="background: #e0e0e0; color: #333; padding: 12px 32px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1em;">
          Cancelar
        </button>
      </div>
    </div>
  </div>

</body>
</html>
