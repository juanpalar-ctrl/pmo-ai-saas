<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LARA - Resetear Contraseña</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #00BCD4 0%, #26C6DA 100%);
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
    }
    .box { 
      background: white; 
      padding: 50px; 
      border-radius: 16px; 
      width: 100%; 
      max-width: 500px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
    }
    .header { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      margin-bottom: 30px; 
      padding-bottom: 20px; 
      border-bottom: 2px solid #E0F2F1;
    }
    .logo { 
      width: 80px; 
      height: 80px; 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo img { 
      width: 100%; 
      height: 100%;
      object-fit: contain;
    }
    .brand h1 { 
      font-size: 1.8em; 
      color: #00897B; 
      margin: 0;
    }
    .brand p { 
      font-size: 0.9em; 
      color: #00BCD4; 
      margin: 5px 0 0 0;
    }
    .form-group { 
      margin-bottom: 20px; 
    }
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: #333; 
      font-weight: 600;
    }
    input { 
      width: 100%; 
      padding: 12px; 
      border: 2px solid #E0F2F1; 
      border-radius: 8px; 
      font-size: 1em;
      font-family: inherit;
    }
    input:focus { 
      outline: none; 
      border-color: #00BCD4; 
      box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1);
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: linear-gradient(135deg, #00BCD4 0%, #26C6DA 100%); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      font-size: 1em; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s;
    }
    button:hover:not(:disabled) { 
      transform: translateY(-2px); 
      box-shadow: 0 10px 20px rgba(0, 188, 212, 0.3);
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed;
    }
    .alert { 
      padding: 15px; 
      border-radius: 8px; 
      margin-top: 20px; 
      font-weight: 500;
    }
    .alert-error { 
      background-color: #FFEBEE; 
      color: #C62828; 
      border-left: 4px solid #C62828;
    }
    .alert-success { 
      background-color: #E8F5E9; 
      color: #2E7D32; 
      border-left: 4px solid #2E7D32;
    }
    .back-link { 
      text-align: center; 
      margin-top: 20px;
    }
    .back-link a { 
      color: #00BCD4; 
      text-decoration: none; 
      font-weight: 600;
    }
    .back-link a:hover { 
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="header">
      <div class="logo">
        <img src="logo.jpeg" alt="LARA Logo">
      </div>
      <div class="brand">
        <h1>LARA</h1>
        <p>Intelligence Accelerated</p>
      </div>
    </div>

    <h2 style="color: #333; margin-bottom: 10px;">Resetear Contraseña</h2>
    <p style="color: #666; margin-bottom: 30px; font-size: 0.95em;">Ingresa el token del email y tu nueva contraseña</p>

    <form id="resetForm">
      <div class="form-group">
        <label for="token">Token de Reset</label>
        <input type="text" id="token" placeholder="Pega el token del email" required>
      </div>

      <div class="form-group">
        <label for="newPassword">Nueva Contraseña</label>
        <input type="password" id="newPassword" placeholder="Mínimo 8 caracteres" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword" placeholder="Confirma la contraseña" required>
      </div>

      <button type="submit" id="btn">🔄 Resetear Contraseña</button>
      <div id="alert" style="display: none;"></div>
    </form>

    <div class="back-link">
      <a href="/login">← Volver al login</a>
    </div>
  </div>

  <script>
    // Obtener el token desde URL query params
    const urlParams = new URLSearchParams(location.search);
    const tokenFromUrl = urlParams.get('token');

    if (tokenFromUrl) {
      document.getElementById('token').value = tokenFromUrl;
    }

    document.getElementById('resetForm').onsubmit = async (e) => {
      e.preventDefault();

      const token = document.getElementById('token').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('btn');
      const alertDiv = document.getElementById('alert');

      if (newPassword !== confirmPassword) {
        alertDiv.className = 'alert alert-error';
        alertDiv.textContent = '❌ Las contraseñas no coinciden';
        alertDiv.style.display = 'block';
        return;
      }

      if (newPassword.length < 8) {
        alertDiv.className = 'alert alert-error';
        alertDiv.textContent = '❌ La contraseña debe tener mínimo 8 caracteres';
        alertDiv.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Procesando...';
      alertDiv.style.display = 'none';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await res.json();

        if (res.ok) {
          alertDiv.className = 'alert alert-success';
          alertDiv.textContent = '✅ ' + data.message;
          alertDiv.style.display = 'block';
          
          setTimeout(() => {
            window.location = '/login';
          }, 2000);
        } else {
          alertDiv.className = 'alert alert-error';
          alertDiv.textContent = '❌ ' + (data.error || 'Error desconocido');
          alertDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '🔄 Resetear Contraseña';
        }
      } catch (error) {
        alertDiv.className = 'alert alert-error';
        alertDiv.textContent = '❌ Error: ' + error.message;
        alertDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔄 Resetear Contraseña';
      }
    };
  </script>
</body>
</html>
