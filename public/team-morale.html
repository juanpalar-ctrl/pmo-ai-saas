<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LARA — Team Morale</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #17B8A0 0%, #0B7B8C 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.97); backdrop-filter: blur(10px); }

    .rag-green  { color: #15803d !important; }
    .rag-yellow { color: #b45309 !important; }
    .rag-red    { color: #dc2626 !important; }

    .rag-border-green  { border-top-color: #16a34a !important; }
    .rag-border-yellow { border-top-color: #d97706 !important; }
    .rag-border-red    { border-top-color: #dc2626 !important; }
    .rag-border-none   { border-top-color: #d1d5db !important; }

    .rag-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 9999px; text-transform: uppercase; letter-spacing: .04em;
    }
    .rag-badge.green  { background: #dcfce7; color: #15803d; }
    .rag-badge.yellow { background: #fef3c7; color: #92400e; }
    .rag-badge.red    { background: #fee2e2; color: #991b1b; }
    .rag-badge.none   { background: #f3f4f6; color: #6b7280; }
    .axis-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .04em; }
    .axis-row   { display: flex; justify-content: space-between; font-size: 11px; color: #6b7280; padding: 1px 0; }
    .axis-row b { font-weight: 600; color: #374151; }

    .filter-chip { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 9999px; border: 1px solid #e5e7eb; color: #4b5563; background: white; cursor: pointer; transition: all .15s; }
    .filter-chip.active { background: #0B7B8C; color: white; border-color: #0B7B8C; }
  </style>
</head>
<body>

  <div class="min-h-screen flex flex-col">

    <header class="glass shadow-lg px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3 sm:gap-4">
        <img src="logo.jpeg" alt="LARA" class="h-10 w-10 rounded-lg object-cover">
        <div>
          <h1 class="font-bold text-lg sm:text-xl text-gray-800">LARA</h1>
          <p class="text-xs text-teal-600 font-semibold">Team Morale</p>
        </div>
        <div class="hidden sm:block w-px h-10 bg-teal-200 mx-1"></div>
        <div class="hidden sm:flex items-center gap-2">
          <a href="/portfolio" class="flex items-center gap-1.5 text-sm font-semibold text-gray-500 hover:text-teal-700 hover:bg-teal-50 border border-transparent hover:border-teal-200 px-3 py-1.5 rounded-lg transition">
            <i class="fa-solid fa-briefcase"></i> Portfolio C-Level
          </a>
          <span class="flex items-center gap-1.5 text-sm font-semibold text-teal-700 bg-teal-50 border border-teal-200 px-3 py-1.5 rounded-lg">
            <i class="fa-solid fa-users"></i> Team Morale
          </span>
        </div>
      </div>
      <div class="flex items-center gap-3 sm:gap-4 flex-wrap">
        <a href="/projects" class="text-sm text-teal-600 hover:text-teal-800 font-semibold flex items-center gap-1">
          <i class="fa-solid fa-chart-gantt"></i> <span class="hidden sm:inline">Vista Proyecto</span>
        </a>
        <span id="userEmail" class="hidden md:inline text-sm text-gray-500 font-medium"></span>
        <button onclick="logout()" class="bg-gradient-to-r from-teal-500 to-teal-700 text-white px-3 sm:px-4 py-2 rounded-lg text-sm font-semibold shadow">
          Cerrar sesión
        </button>
      </div>
    </header>

    <main class="flex-1 p-6 space-y-6 max-w-screen-xl mx-auto w-full">

      <div id="loading" class="flex flex-col items-center justify-center py-24 text-white">
        <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
        <p class="text-lg font-semibold">Cargando equipo...</p>
      </div>

      <div id="empty-state" class="hidden glass rounded-2xl p-16 text-center">
        <i class="fa-solid fa-users text-5xl text-teal-300 mb-4"></i>
        <h2 class="text-xl font-bold text-gray-600 mb-2">Sin datos de equipo todavía</h2>
        <p class="text-gray-400 mb-6" id="empty-state-detail">Mapea la columna "Responsable / Asignado a" al subir tu Excel para poblar el tablero de equipo.</p>
        <a href="/projects" class="bg-teal-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-teal-700">Ir a Proyectos</a>
      </div>

      <div id="team-content" class="hidden space-y-6">

        <div class="glass rounded-2xl p-5 shadow-lg space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-2 flex-wrap">
              <label for="project-select" class="text-xs font-semibold text-gray-500 uppercase">Proyecto</label>
              <select id="project-select" onchange="onProjectChange(this.value)" class="text-sm font-semibold text-gray-700 border border-gray-200 rounded-lg px-3 py-2 bg-white"></select>
            </div>
            <div id="gss-badge"></div>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <input id="search-input" type="text" placeholder="Buscar por nombre..." oninput="render()" class="flex-1 min-w-[160px] text-sm border border-gray-200 rounded-lg px-3 py-2">
            <button class="filter-chip active" data-status="all" onclick="setStatusFilter('all', this)">Todos</button>
            <button class="filter-chip" data-status="green" onclick="setStatusFilter('green', this)">🟢 Al día</button>
            <button class="filter-chip" data-status="yellow" onclick="setStatusFilter('yellow', this)">🟡 Ojo</button>
            <button class="filter-chip" data-status="red" onclick="setStatusFilter('red', this)">🔴 Atención</button>
          </div>
        </div>

        <div id="team-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        <p id="no-results" class="hidden text-center text-gray-400 text-sm py-8">Ningún miembro coincide con este filtro.</p>

      </div>
    </main>
  </div>

  <!-- MODAL FEEDBACK 1-ON-1 -->
  <div id="feedbackModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;">
      <div style="background: linear-gradient(to right, #17B8A0, #0B7B8C); color: white; padding: 24px;">
        <h2 style="font-size: 1.3em; font-weight: bold; margin: 0;">Registrar feedback</h2>
        <p id="feedback-modal-subtitle" style="font-size: 0.9em; margin: 8px 0 0 0; opacity: 0.9;"></p>
      </div>
      <div style="padding: 24px;">
        <textarea id="feedback-note-text" rows="4" placeholder="¿Cómo está el equipo? ej. 'Se siente frustrado por la falta de especificación en el diseño de las APIs, pero está motivado con el proyecto'" style="width:100%; border:1px solid #ddd; border-radius:8px; padding:10px; font-family:inherit; font-size:0.9em;"></textarea>
        <div id="feedback-result" style="display:none; margin-top:14px; padding:12px; border-radius:8px; background:#f0fdf4; border:1px solid #86efac;"></div>
      </div>
      <div style="background: #f5f5f5; padding: 16px 24px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; gap: 12px;">
        <button onclick="closeFeedbackModal()" style="background: #ccc; color: #333; padding: 10px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Cerrar</button>
        <button onclick="submitFeedback()" id="submitFeedbackBtn" style="background: linear-gradient(135deg, #17B8A0 0%, #0B7B8C 100%); color: white; padding: 10px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // Fase 1: two independent axes (workload / people health) + a combined
    // overall level. Each is green/yellow/red; people health can also be "none"
    // (never had feedback → gray "sin datos", not an alarm).
    const BORDER = { green: 'rag-border-green', yellow: 'rag-border-yellow', red: 'rag-border-red', none: 'rag-border-none' };
    const TEXT   = { green: 'rag-green', yellow: 'rag-yellow', red: 'rag-red', none: '' };
    const EMOJI  = { green: '🟢', yellow: '🟡', red: '🔴', none: '⚪' };
    const OVERALL_LABEL   = { green: 'Al día', yellow: 'Ojo', red: 'Atención' };
    const WORKLOAD_LABEL  = { green: 'Al día', yellow: 'Ojo', red: 'Sobrecargado' };
    const PEOPLE_LABEL    = { green: 'Motivado', yellow: 'Reconectar', red: 'En riesgo', none: 'Sin datos' };
    const SENTIMENT_LABEL = { positive: 'positivo', neutral: 'neutral', negative: 'negativo', mixed: 'mixto' };

    function ragBadge(level, label) {
      return `<span class="rag-badge ${level}">${EMOJI[level]} ${label}</span>`;
    }

    let projects = [];         // [{ projectId, projectName, groupSatisfactionScore, members: [...] }]
    let overallGSS = null;
    let currentProjectId = 'all';
    let currentStatusFilter = 'all';
    let activeFeedbackProjectId = null;
    let activeFeedbackMemberId = null;

    window.onload = async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) { window.location = '/login'; return; }
        const data = await res.json();
        document.getElementById('userEmail').textContent = data.user.email;
      } catch { window.location = '/login'; return; }

      await loadTeamData();
    };

    async function loadTeamData() {
      try {
        const r = await fetch('/api/team', { credentials: 'include' });
        const json = await r.json();
        if (!json.success) throw new Error(json.error || 'Error');

        projects = json.data.projects || [];
        overallGSS = json.data.groupSatisfactionScore;

        const requestedId = new URLSearchParams(location.search).get('id');
        if (requestedId && !projects.some(p => String(p.projectId) === requestedId)) {
          // Project has no members yet (or doesn't exist) — fetch it directly
          // so we can still show its name and the "not populated" empty state.
          await loadEmptyProject(requestedId);
        }

        if (projects.length === 0) {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('empty-state').classList.remove('hidden');
          return;
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('team-content').classList.remove('hidden');

        populateProjectSelect();
        currentProjectId = requestedId && projects.some(p => String(p.projectId) === requestedId) ? requestedId : 'all';
        document.getElementById('project-select').value = currentProjectId;
        render();
      } catch (e) {
        document.getElementById('loading').innerHTML = '<p class="text-white text-lg">Error cargando el equipo. Intenta de nuevo.</p>';
      }
    }

    async function loadEmptyProject(projectId) {
      try {
        const r = await fetch(`/api/team/${projectId}`, { credentials: 'include' });
        const json = await r.json();
        if (!json.success) return;
        projects.push({
          projectId: Number(projectId),
          projectName: json.data.projectName || `Proyecto ${projectId}`,
          groupSatisfactionScore: json.data.groupSatisfactionScore,
          members: json.data.members || [],
        });
      } catch (_) {}
    }

    function populateProjectSelect() {
      const select = document.getElementById('project-select');
      select.innerHTML = `<option value="all">Todos los proyectos</option>` +
        projects.map(p => `<option value="${p.projectId}">${p.projectName}</option>`).join('');
    }

    function onProjectChange(value) {
      currentProjectId = value;
      const url = new URL(location.href);
      if (value === 'all') url.searchParams.delete('id'); else url.searchParams.set('id', value);
      history.replaceState(null, '', url);
      render();
    }

    function setStatusFilter(status, btn) {
      currentStatusFilter = status;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function scopedProjects() {
      return currentProjectId === 'all' ? projects : projects.filter(p => String(p.projectId) === String(currentProjectId));
    }

    function render() {
      const scoped = scopedProjects();
      const showTag = currentProjectId === 'all' && scoped.length > 1;
      const flat = scoped.flatMap(p => p.members.map(m => ({ ...m, projectId: p.projectId, projectName: p.projectName })));

      const gss = currentProjectId === 'all' ? overallGSS : (scoped[0]?.groupSatisfactionScore ?? null);
      const gssBadge = document.getElementById('gss-badge');
      gssBadge.innerHTML = gss !== null
        ? ragBadge(gss >= 70 ? 'green' : gss >= 50 ? 'yellow' : 'red', `Satisfacción del equipo: ${gss}%`)
        : '';

      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const filtered = flat.filter(m => {
        if (currentStatusFilter !== 'all' && m.overallLevel !== currentStatusFilter) return false;
        if (query && !m.name.toLowerCase().includes(query)) return false;
        return true;
      });

      const grid = document.getElementById('team-grid');
      const noResults = document.getElementById('no-results');
      if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.textContent = flat.length === 0
          ? 'Aún no se detectó personal asignado en este proyecto. Mapea la columna "Responsable / Asignado a" al subir tu Excel para poblar este tablero.'
          : 'Ningún miembro coincide con este filtro.';
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');

      grid.innerHTML = filtered.map(m => renderMemberCard(m, showTag)).join('');
    }

    function renderMemberCard(m, showTag) {
      const w = m.workload, ph = m.peopleHealth;
      const tag = showTag ? `<p class="text-[11px] text-teal-600 font-semibold mt-0.5 truncate">${m.projectName}</p>` : '';

      const wellLabel = ph.wellbeingScore !== null ? `${(ph.wellbeingScore * 100).toFixed(0)}%` : 'Sin datos';
      const feedbackLabel = ph.daysSinceFeedback !== null ? `hace ${ph.daysSinceFeedback} d` : 'Sin feedback';
      const sentimentLabel = ph.sentiment ? (SENTIMENT_LABEL[ph.sentiment] || ph.sentiment) : '—';
      const criticalClass = w.criticalDelayedCount > 0 ? 'rag-red' : '';

      const tasksHtml = m.currentTasks.length > 0
        ? m.currentTasks.map(t => `<span class="text-xs bg-gray-100 border rounded px-2 py-0.5 text-gray-600 truncate max-w-[120px] inline-block" title="${t}">${t}</span>`).join(' ')
        : '<span class="text-xs text-gray-400">Sin tareas activas</span>';

      return `
        <div class="bg-white rounded-xl shadow-md border-t-4 ${BORDER[m.overallLevel]} hover:shadow-lg transition overflow-hidden">
          <div class="p-4 pb-3 flex items-start justify-between gap-2">
            <div class="min-w-0">
              <p class="font-bold text-gray-800 truncate">${m.name}</p>
              <button class="text-xs text-teal-600 hover:underline" onclick="editMemberRole(${m.projectId}, ${m.id}, '${(m.role || '').replace(/'/g, "\\'")}')">
                ${m.role ? m.role : '+ Agregar rol'}
              </button>
              ${tag}
            </div>
            ${ragBadge(m.overallLevel, OVERALL_LABEL[m.overallLevel])}
          </div>
          <div class="grid grid-cols-2 border-t border-gray-100">
            <div class="p-3 border-r border-gray-100">
              <p class="axis-label mb-2"><i class="fa-solid fa-chart-column"></i> Carga</p>
              ${ragBadge(w.level, WORKLOAD_LABEL[w.level])}
              <div class="mt-2">
                <div class="axis-row"><span>Activas</span><b>${w.activeCount} <span class="text-gray-400 font-normal">(prom. ${w.teamAvgActive})</span></b></div>
                <div class="axis-row"><span>Atrasadas</span><b>${w.overdueCount}</b></div>
                <div class="axis-row"><span>Críticas</span><b class="${criticalClass}">${w.criticalDelayedCount}</b></div>
              </div>
            </div>
            <div class="p-3">
              <p class="axis-label mb-2"><i class="fa-solid fa-face-smile"></i> People Health</p>
              ${ragBadge(ph.level, PEOPLE_LABEL[ph.level])}
              <div class="mt-2">
                <div class="axis-row"><span>Bienestar</span><b class="${TEXT[ph.level]}">${wellLabel}</b></div>
                <div class="axis-row"><span>Feedback</span><b>${feedbackLabel}</b></div>
                <div class="axis-row"><span>Sentimiento</span><b>${sentimentLabel}</b></div>
              </div>
            </div>
          </div>
          <div class="px-4 py-2.5 border-t border-gray-100 flex items-center justify-between gap-2">
            <div class="flex flex-wrap gap-1 min-w-0 overflow-hidden">${tasksHtml}</div>
            <button class="text-xs bg-teal-50 hover:bg-teal-100 text-teal-700 font-semibold px-3 py-1 rounded-lg whitespace-nowrap flex-shrink-0" onclick="openFeedbackModal(${m.projectId}, ${m.id}, '${m.name.replace(/'/g, "\\'")}')">
              + Feedback
            </button>
          </div>
        </div>`;
    }

    function openFeedbackModal(projectId, memberId, memberName) {
      activeFeedbackProjectId = projectId;
      activeFeedbackMemberId = memberId;
      document.getElementById('feedback-modal-subtitle').textContent = memberName;
      document.getElementById('feedback-note-text').value = '';
      document.getElementById('feedback-result').style.display = 'none';
      document.getElementById('feedbackModal').style.display = 'flex';
    }

    function closeFeedbackModal() {
      document.getElementById('feedbackModal').style.display = 'none';
      activeFeedbackProjectId = null;
      activeFeedbackMemberId = null;
    }

    async function submitFeedback() {
      const noteText = document.getElementById('feedback-note-text').value.trim();
      if (!noteText || !activeFeedbackMemberId || !activeFeedbackProjectId) return;

      const btn = document.getElementById('submitFeedbackBtn');
      btn.disabled = true;
      btn.textContent = 'Analizando...';

      try {
        const r = await fetch(`/api/team/${activeFeedbackProjectId}/members/${activeFeedbackMemberId}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ noteText }),
        });
        const json = await r.json();
        const resultBox = document.getElementById('feedback-result');
        if (json.success) {
          resultBox.style.display = 'block';
          resultBox.innerHTML = `<p class="text-sm text-green-800"><strong>Score de bienestar: ${(json.data.wellbeingScore * 100).toFixed(0)}%</strong></p><p class="text-xs text-green-700 mt-1">${json.data.reasoning}</p>`;
          await loadTeamData();
        } else {
          resultBox.style.display = 'block';
          resultBox.innerHTML = `<p class="text-sm text-red-700">${json.error || 'Error al guardar el feedback'}</p>`;
        }
      } catch (_) {
        document.getElementById('feedback-result').style.display = 'block';
        document.getElementById('feedback-result').innerHTML = `<p class="text-sm text-red-700">Error de conexión</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar';
      }
    }

    async function editMemberRole(projectId, memberId, currentRole) {
      const role = prompt('Rol de este miembro del equipo:', currentRole || '');
      if (role === null || role.trim() === '') return;

      try {
        await fetch(`/api/team/${projectId}/members/${memberId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ role: role.trim() }),
        });
        await loadTeamData();
      } catch (_) {}
    }

    function logout() {
      fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).then(() => { window.location = '/login'; });
    }
  </script>
</body>
</html>
