services:
  - type: web
    name: pmo-ai-saas
    runtime: node
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      # Base pública para los enlaces de reseteo de contraseña (passwordResetService)
      - key: APP_BASE_URL
        sync: false
